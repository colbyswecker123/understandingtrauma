<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message Review | Understanding Trauma</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="admin-body">
<div class="admin-shell">
<header class="admin-header">
<a class="brand" href="/">
<span class="brand-mark" aria-hidden="true">UT</span>
<span class="brand-text"><strong>Understanding</strong><span>Trauma</span></span>
</a>
<a class="text-link" href="/">View site</a>
</header>
<main>
<section class="admin-panel">
<p class="eyebrow">Private review area</p>
<h1>Pending messages</h1>
<p>Enter the admin token stored in Cloudflare Pages to review, approve, or reject submitted messages.</p>
<form class="token-form" id="tokenForm">
<label for="token">Admin token</label>
<input id="token" type="password" autocomplete="current-password" placeholder="Paste token">
<button class="button button-primary" type="submit">Load pending messages</button>
</form>
<div class="admin-status" id="adminStatus" role="status" aria-live="polite"></div>
<div class="message-list" id="messageList"></div>
</section>
</main>
</div>
<script src="/assets/js/admin.js" defer></script>
</body>
</html>
